<div id="plw-{{ widget.name }}" class="mt-1">
  {% if widget.hint %}<p class="text-xs text-gray-400 mb-2">{{ widget.hint }}</p>{% endif %}
  <div class="flex items-center gap-2 mb-2">
    <button type="button" id="plw-toggle-{{ widget.name }}"
      class="px-2 py-1 text-xs rounded-md border border-gray-300 text-gray-500 bg-white hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-600 dark:text-gray-300 dark:hover:bg-gray-700">编辑原始 JSON</button>
    <span id="plw-err-{{ widget.name }}" class="text-xs text-red-500 hidden"></span>
  </div>
  <div id="plw-rows-{{ widget.name }}" class="flex flex-col gap-2"></div>
  <textarea id="plw-raw-{{ widget.name }}" rows="12" spellcheck="false"
    class="hidden w-full px-2 py-1 text-sm font-mono rounded-md border border-gray-300 bg-white text-gray-700 dark:bg-gray-900 dark:border-gray-600 dark:text-gray-300 focus:border-primary-500 focus:ring-primary-500"></textarea>
  <input type="hidden" id="plw-hidden-{{ widget.name }}" name="{{ widget.name }}" />
</div>

<script>
(function() {
  var items = {{ widget.items_json|safe }};
  var allowDisable = {{ widget.allow_disable|yesno:"true,false" }};
  var lockedValues = {{ widget.locked_values_json|safe }};
  var rowsBox = document.getElementById('plw-rows-{{ widget.name }}');
  var raw = document.getElementById('plw-raw-{{ widget.name }}');
  var hidden = document.getElementById('plw-hidden-{{ widget.name }}');
  var toggleBtn = document.getElementById('plw-toggle-{{ widget.name }}');
  var errBox = document.getElementById('plw-err-{{ widget.name }}');
  var mode = 'rich';

  var INPUT_CLS = 'px-2 py-1 text-sm rounded-md border border-gray-300 bg-white text-gray-700 dark:bg-gray-900 dark:border-gray-600 dark:text-gray-300 focus:border-primary-500 focus:ring-primary-500';
  var BTN_CLS = 'px-1.5 py-1 text-xs rounded-md border border-gray-300 text-gray-500 bg-white hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-600 dark:text-gray-300 dark:hover:bg-gray-700';

  // 隐藏 input 始终是提交源:rich 模式由 items 序列化;raw 模式仅在 JSON 合法时回写
  function sync() {
    hidden.value = JSON.stringify(items);
  }

  function render() {
    rowsBox.innerHTML = '';
    items.forEach(function(item, i) {
      var row = document.createElement('div');
      row.className = 'flex items-center gap-2';

      var colorWrap = document.createElement('div');
      colorWrap.className = 'flex items-center gap-1.5';
      var color = document.createElement('input');
      color.type = 'color';
      color.value = item.background || '#9ca3af';
      color.disabled = !item.background;
      color.style.cssText = 'width:32px;height:26px;padding:1px;border-radius:6px;border:1px solid #d1d5db;background:none;cursor:pointer;' + (item.background ? '' : 'opacity:.3;');
      color.title = '主色';

      var hex = document.createElement('input');
      hex.type = 'text';
      hex.value = item.background || '';
      hex.placeholder = '#A8B6C4';
      hex.disabled = !item.background;
      hex.maxLength = 7;
      hex.className = INPUT_CLS + ' w-24 font-mono' + (item.background ? '' : ' opacity-30');
      hex.title = '直接输入色值 (如 #A8B6C4)';
      // 接受 #RGB / #RRGGBB,可省略 #;非法输入不写回,失焦时还原
      function normalizeHex(s) {
        s = s.trim();
        if (!s) return null;
        if (s[0] !== '#') s = '#' + s;
        if (/^#[0-9a-fA-F]{3}$/.test(s)) s = '#' + s[1] + s[1] + s[2] + s[2] + s[3] + s[3];
        return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : null;
      }
      color.addEventListener('input', function() { item.background = color.value; hex.value = color.value; sync(); });
      hex.addEventListener('input', function() {
        var v = normalizeHex(hex.value);
        if (v) { item.background = v; color.value = v; sync(); }
      });
      hex.addEventListener('blur', function() {
        var v = normalizeHex(hex.value);
        hex.value = v || item.background || '';
      });

      var noneLabel = document.createElement('label');
      noneLabel.className = 'flex items-center gap-1 text-xs text-gray-500 dark:text-gray-400 cursor-pointer select-none';
      var none = document.createElement('input');
      none.type = 'checkbox';
      none.checked = !item.background;
      none.addEventListener('change', function() {
        item.background = none.checked ? '' : (color.value === '#9ca3af' ? '#9ca3af' : color.value);
        render(); sync();
      });
      noneLabel.appendChild(none);
      noneLabel.appendChild(document.createTextNode('无底色'));
      colorWrap.appendChild(color);
      colorWrap.appendChild(hex);
      colorWrap.appendChild(noneLabel);

      // 档位「值」锁定只读:Issue 模型 choices 与状态流转逻辑硬编码这些 value,
      // 增删/改值会产生前端可选、后端 400 的半成品档位(admin 只应改显示名/颜色/顺序)
      var value = document.createElement('input');
      value.type = 'text';
      value.value = item.value;
      value.readOnly = true;
      value.tabIndex = -1;
      value.className = INPUT_CLS + ' w-24 font-mono opacity-60 cursor-not-allowed';
      value.title = '档位值由系统固定,仅可调整显示名/颜色/顺序';

      var label = document.createElement('input');
      label.type = 'text';
      label.value = item.label;
      label.placeholder = '{{ widget.label_placeholder|escapejs }}';
      label.className = INPUT_CLS + ' w-32';
      label.addEventListener('input', function() { item.label = label.value.trim(); sync(); });

      function mkBtn(text, title, fn) {
        var b = document.createElement('button');
        b.type = 'button';
        b.textContent = text;
        b.title = title;
        b.className = BTN_CLS;
        b.addEventListener('click', fn);
        return b;
      }

      var up = mkBtn('↑', '上移', function() {
        if (i > 0) { items.splice(i - 1, 0, items.splice(i, 1)[0]); render(); sync(); }
      });
      var down = mkBtn('↓', '下移', function() {
        if (i < items.length - 1) { items.splice(i + 1, 0, items.splice(i, 1)[0]); render(); sync(); }
      });

      row.appendChild(colorWrap);
      row.appendChild(value);
      row.appendChild(label);

      // 「禁用」复选框:被禁用的状态在前端各选择/展示入口隐藏(已有该状态的工单仍显示)。
      // 流程关键状态(系统自动赋值)置灰不可禁用,raw JSON 编辑可绕过,后端 clean() 兜底。
      if (allowDisable) {
        var disLabel = document.createElement('label');
        var locked = lockedValues.indexOf(item.value) !== -1;
        disLabel.className = 'flex items-center gap-1 text-xs text-gray-500 dark:text-gray-400 select-none ' + (locked ? 'opacity-40 cursor-not-allowed' : 'cursor-pointer');
        var dis = document.createElement('input');
        dis.type = 'checkbox';
        dis.checked = !!item.disabled;
        if (locked) {
          dis.disabled = true;
          disLabel.title = '流程关键状态不可禁用';
        } else {
          dis.addEventListener('change', function() { item.disabled = dis.checked; sync(); });
        }
        disLabel.appendChild(dis);
        disLabel.appendChild(document.createTextNode('禁用'));
        row.appendChild(disLabel);
      }

      row.appendChild(up);
      row.appendChild(down);
      rowsBox.appendChild(row);
    });
  }

  function showError(msg) { errBox.textContent = msg; errBox.classList.remove('hidden'); }
  function clearError() { errBox.textContent = ''; errBox.classList.add('hidden'); }

  // raw 文本解析为数组则返回,否则 null(非法 JSON / 非数组)
  function parseRaw() {
    try {
      var parsed = JSON.parse(raw.value);
      return Array.isArray(parsed) ? parsed : null;
    } catch (e) { return null; }
  }

  function enterRaw() {
    raw.value = JSON.stringify(items, null, 2);
    raw.classList.remove('border-red-500');
    rowsBox.classList.add('hidden');
    raw.classList.remove('hidden');
    toggleBtn.textContent = '返回可视化编辑';
    mode = 'raw';
    clearError();
  }

  function enterRich() {
    var parsed = parseRaw();
    if (parsed === null) { showError('JSON 格式错误,无法返回可视化编辑'); return; }
    items = parsed;
    raw.classList.add('hidden');
    rowsBox.classList.remove('hidden');
    toggleBtn.textContent = '编辑原始 JSON';
    mode = 'rich';
    clearError();
    render(); sync();
  }

  toggleBtn.addEventListener('click', function() {
    if (mode === 'rich') enterRaw(); else enterRich();
  });

  // raw 模式下实时校验:合法则回写隐藏 input;非法则红框提示且不写入(提交将保留上次合法内容)
  raw.addEventListener('input', function() {
    var parsed = parseRaw();
    if (parsed === null) {
      raw.classList.add('border-red-500');
      showError('JSON 格式错误,提交将保留上一次合法内容');
    } else {
      raw.classList.remove('border-red-500');
      clearError();
      items = parsed; sync();
    }
  });

  render();
  sync();
})();
</script>
