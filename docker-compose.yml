services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REPO_CLONE_DIR=/data/repos
    volumes:
      - repo_data:/data/repos
      - backups:/data/backups
    command: >
      sh -c "uv run --no-sync python manage.py migrate --noinput &&
             uv run --no-sync python manage.py sync_page_perms 2>/dev/null || true &&
             uv run --no-sync python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NUXT_API_BASE: http://backend:8000
    environment:
      - NUXT_PUBLIC_SERVER_MONITOR_URL=${NUXT_PUBLIC_SERVER_MONITOR_URL:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - REPO_CLONE_DIR=/data/repos
    volumes:
      - repo_data:/data/repos
    command: uv run --no-sync celery -A config worker -l info
    depends_on:
      - backend

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    command: uv run --no-sync celery -A config beat -l info --scheduler django_celery_beat.schedulers.DatabaseScheduler
    depends_on:
      - backend

volumes:
  pgdata:
  repo_data:
  backups:
