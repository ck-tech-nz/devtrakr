name: Build and Push Services

on:
  push:
    branches:
      - env/test
      - env/prod

env:
  REGISTRY: registry.cktech.hk
  REGISTRY_USERNAME: ck
  PROJECT_NAME: devtrakr

jobs:
  set-env:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.set-env.outputs.env }}
    steps:
      - name: Set environment based on branch
        id: set-env
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          if [[ "$BRANCH_NAME" == "env/prod" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=test" >> $GITHUB_OUTPUT
          fi

  build-backend:
    needs: [set-env]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate VERSION file
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          ENV=${{ needs.set-env.outputs.env }}
          echo "env/${ENV} ${SHORT_SHA}" > backend/VERSION

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.ARTIFACT_REGISTRY_PRIVATE_KEY }}

      - name: Check existing Backend image
        id: image-check
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/backend-${{ needs.set-env.outputs.env }}
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
        run: |
          if docker buildx imagetools inspect "${IMAGE}:${SHORT_SHA}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Backend image
        if: steps.image-check.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: true
          # 关闭 provenance，保持产物为普通镜像 manifest，兼容自建 registry 和 Watchtower
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/backend-${{ needs.set-env.outputs.env }}:latest
            ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/backend-${{ needs.set-env.outputs.env }}:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha,scope=backend-${{ needs.set-env.outputs.env }}
          cache-to: type=gha,scope=backend-${{ needs.set-env.outputs.env }},mode=max

      - name: Skip existing Backend image
        if: steps.image-check.outputs.exists == 'true'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/backend-${{ needs.set-env.outputs.env }}
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
        run: |
          echo "Backend image for ${SHORT_SHA} already exists; promoting it to latest without rebuilding."
          docker buildx imagetools create --prefer-index=false --tag "${IMAGE}:latest" "${IMAGE}:${SHORT_SHA}"

  build-frontend:
    needs: [set-env]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate VERSION file
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          ENV=${{ needs.set-env.outputs.env }}
          echo "env/${ENV} ${SHORT_SHA}" > frontend/VERSION

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.ARTIFACT_REGISTRY_PRIVATE_KEY }}

      - name: Check existing Frontend image
        id: image-check
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/frontend-${{ needs.set-env.outputs.env }}
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
        run: |
          if docker buildx imagetools inspect "${IMAGE}:${SHORT_SHA}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Frontend image
        if: steps.image-check.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          # 关闭 provenance，保持产物为普通镜像 manifest，兼容自建 registry 和 Watchtower
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/frontend-${{ needs.set-env.outputs.env }}:latest
            ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/frontend-${{ needs.set-env.outputs.env }}:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha,scope=frontend-${{ needs.set-env.outputs.env }}
          cache-to: type=gha,scope=frontend-${{ needs.set-env.outputs.env }},mode=max

      - name: Skip existing Frontend image
        if: steps.image-check.outputs.exists == 'true'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/frontend-${{ needs.set-env.outputs.env }}
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
        run: |
          echo "Frontend image for ${SHORT_SHA} already exists; promoting it to latest without rebuilding."
          docker buildx imagetools create --prefer-index=false --tag "${IMAGE}:latest" "${IMAGE}:${SHORT_SHA}"

  notify:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify success
        if: needs.build-backend.result == 'success' && needs.build-frontend.result == 'success'
        run: |
          ENV_NAME=$(echo ${GITHUB_REF#refs/heads/} | cut -d'/' -f2)
          curl "https://api.day.app/6T7AMV3JFUQLkYtRE6h7mF/GitHub/${{ env.PROJECT_NAME }}%20%5B${ENV_NAME}%5D%20build%20success"

      - name: Notify failure
        if: needs.build-backend.result == 'failure' || needs.build-frontend.result == 'failure'
        run: |
          ENV_NAME=$(echo ${GITHUB_REF#refs/heads/} | cut -d'/' -f2)
          FAILED=""
          if [[ "${{ needs.build-backend.result }}" == "failure" ]]; then FAILED="backend"; fi
          if [[ "${{ needs.build-frontend.result }}" == "failure" ]]; then FAILED="${FAILED:+$FAILED+}frontend"; fi
          curl "https://api.day.app/6T7AMV3JFUQLkYtRE6h7mF/GitHub/${{ env.PROJECT_NAME }}%20%5B${ENV_NAME}%5D%20${FAILED}%20build%20FAILED"
