services:
  backend:
    image: registry.cktech.hk/devtrakr/backend-prod
    container_name: devtrakr-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./.gitconfig-proxy:/root/.gitconfig:ro
      - repo_data:/data/repos
      - ./backups:/data/backups
    networks:
      - db-network
      - traefik-network
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - "traefik.enable=true"
      - "traefik.http.routers.devtrakr-backend.rule=Host(`devtrakr.matrixai.xin`) && PathPrefix(`/api`)"
      - "traefik.http.routers.devtrakr-backend.entrypoints=web"
      - "traefik.http.services.devtrakr-backend.loadbalancer.server.port=8000"
    command: >
      sh -c "uv run --no-sync python manage.py migrate --noinput &&
             uv run --no-sync python manage.py sync_page_perms 2>/dev/null || true &&
             uv run --no-sync uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --workers 4"

  frontend:
    image: registry.cktech.hk/devtrakr/frontend-prod
    container_name: devtrakr-frontend
    restart: unless-stopped
    environment:
      # 服务器资源 iframe 嵌入地址(运行时注入,值取自同目录 .env)
      - NUXT_PUBLIC_SERVER_MONITOR_URL=${NUXT_PUBLIC_SERVER_MONITOR_URL}
    networks:
      - db-network
      - traefik-network
    depends_on:
      - backend
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - "traefik.enable=true"
      - "traefik.http.routers.devtrakr-frontend.rule=Host(`devtrakr.matrixai.xin`)"
      - "traefik.http.routers.devtrakr-frontend.entrypoints=web"
      - "traefik.http.services.devtrakr-frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.devtrakr-frontend.priority=1"

  celery-worker:
    image: registry.cktech.hk/devtrakr/backend-prod
    container_name: devtrakr-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./.gitconfig-proxy:/root/.gitconfig:ro
      - repo_data:/data/repos
    networks:
      - db-network
    labels:
      - com.centurylinklabs.watchtower.enable=true
    command: uv run --no-sync celery -A config worker -l info

  celery-beat:
    image: registry.cktech.hk/devtrakr/backend-prod
    container_name: devtrakr-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - db-network
    labels:
      - com.centurylinklabs.watchtower.enable=true
    command: uv run --no-sync celery -A config beat -l info --scheduler django_celery_beat.schedulers.DatabaseScheduler

networks:
  db-network:
    name: db-network
    external: true
  traefik-network:
    name: traefik-network
    external: true

volumes:
  repo_data:
