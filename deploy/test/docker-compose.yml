services:
  backend:
    #image: registry.aimenu.tech/devtrakr/backend-test
    image: registry.cktech.hk/devtrakr/backend-test
    container_name: devtrakr
    env_file:
      - .env
    volumes:
      - ./backups:/data/backups
      - ./ssh:/root/.ssh:ro
    networks:
      - db-network
      - traefik-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.devtrakr-backend.rule=Host(`devtrakr-test.matrixai.xin`) && PathPrefix(`/api`)"
      - "traefik.http.routers.devtrakr-backend.entrypoints=web"
      - "traefik.http.services.devtrakr-backend.loadbalancer.server.port=8000"
    command: >
      sh -c "uv run --no-sync python manage.py migrate --noinput &&
             { uv run --no-sync python manage.py sync_page_perms 2>/dev/null || true; } &&
             uv run --no-sync python manage.py runserver 0.0.0.0:8000"

  frontend:
    #image: registry.aimenu.tech/devtrakr/frontend-test
    image: registry.cktech.hk/devtrakr/frontend-test
    container_name: devtrakr-frontend
    environment:
      # 服务器资源 iframe 嵌入地址(运行时注入,值取自同目录 .env)
      - NUXT_PUBLIC_SERVER_MONITOR_URL=${NUXT_PUBLIC_SERVER_MONITOR_URL}
    networks:
      - db-network
      - traefik-network
    depends_on:
      - backend
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - "traefik.enable=true"
      - "traefik.http.routers.devtrakr-frontend.rule=Host(`devtrakr-test.matrixai.xin`)"
      - "traefik.http.routers.devtrakr-frontend.entrypoints=web"
      - "traefik.http.services.devtrakr-frontend.loadbalancer.server.port=3000"

  celery-worker:
    image: registry.cktech.hk/devtrakr/backend-test
    container_name: devtrakr-celery-worker-test
    env_file:
      - .env
    volumes:
      - ./backups:/data/backups
      - ./ssh:/root/.ssh:ro
    networks:
      - db-network
    command: uv run --no-sync celery -A config worker -l info -E
    labels:
      - com.centurylinklabs.watchtower.enable=true

  celery-beat:
    image: registry.cktech.hk/devtrakr/backend-test
    container_name: devtrakr-celery-beat-test
    env_file:
      - .env
    networks:
      - db-network
    command: uv run --no-sync celery -A config beat -l info --scheduler django_celery_beat.schedulers.DatabaseScheduler
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Kanchi:实时 Celery 任务监控面板,从 redis broker 读取任务事件
  # 通过宿主机端口暴露(前端 :3010、API+WS :8765);不接入 traefik
  # 注:此为 Docker Hub 公共镜像,故意不打 watchtower 标签,避免自动升级造成意外
  kanchi:
    image: getkanchi/kanchi:latest
    container_name: devtrakr-kanchi-test
    restart: unless-stopped
    networks:
      - db-network
    ports:
      - "3010:3000"
      - "8765:8765"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////data/kanchi.db
      # 与 worker 事件时间对齐,消除 worker "last seen" 负值(-28801s ≈ 8h 时区偏移)
      TZ: Asia/Shanghai
      # 浏览器直连地址(内网),必须与你访问面板所用的地址/端口一致
      NUXT_PUBLIC_API_URL: http://172.16.1.177:8765
      NUXT_PUBLIC_WS_URL: ws://172.16.1.177:8765/ws
    volumes:
      - kanchi-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Flower:Celery 实时监控(传统表格 UI)+ flower-i18n-zh 中文补丁(界面右上角中英切换)
  # 与 Kanchi 并存,读同一个 redis broker;镜像本地构建(./flower-zh);宿主机端口 5555 暴露
  flower:
    build: ./flower-zh
    image: devtrakr/flower-zh:latest
    container_name: devtrakr-flower-test
    restart: unless-stopped
    environment:
      # 与 worker(Asia/Shanghai)时区对齐,消除 Flower(默认 UTC)的 8 小时 clock drift 告警
      TZ: Asia/Shanghai
      # 允许无鉴权访问 REST API(面板本身已无鉴权,内网 LAN,与 Kanchi 一致)
      FLOWER_UNAUTHENTICATED_API: "true"
    networks:
      - db-network
    ports:
      - "5555:5555"
    command: celery --broker=redis://redis:6379/0 flower --address=0.0.0.0 --port=5555 --persistent=True --db=/data/flower
    volumes:
      - flower-data:/data

networks:
  db-network:
    name: db-network
    external: true
  traefik-network:
    name: traefik-network
    external: true

volumes:
  kanchi-data:
  flower-data:
